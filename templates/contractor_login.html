<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Login – Labour Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="tricolor-ribbon">
    <div class="ribbon-saffron"></div>
    <div class="ribbon-white"></div>
    <div class="ribbon-green"></div>
</div>

<header class="gov-header">
    <img src="{{ url_for('static', filename='images/logo1.png') }}"
         alt="Official Logo" class="top-logo">
    <div class="header-text">
        <h1>श्रम प्रबंधन प्रणाली</h1>
        <p>Labour Management System</p>
    </div>
</header>

<div class="login-container">
    <div class="login-card">
        <h2>CONTRACTOR</h2>
        <p style="margin-bottom: 20px; color: #555;">Click Proceed to continue with your device ID</p>
        <button id="proceedBtn" class="login-btn">Proceed</button>
        <a href="{{ url_for('home') }}" class="back-btn">← Back to Home</a>
    </div>
</div>

<!-- Chakra loading overlay -->
<div id="chakra-overlay" class="chakra-overlay">
    <div class="chakra-spinner">
        <svg viewBox="0 0 60 60" width="80" height="80">
            <circle cx="30" cy="30" r="8" fill="none" stroke="#0B3D91" stroke-width="3"/>
            <circle cx="30" cy="30" r="16" fill="none" stroke="#FF9933" stroke-width="1" stroke-dasharray="4 4"/>
            <line x1="30" y1="14" x2="30" y2="46" stroke="#0B3D91" stroke-width="2"/>
            <line x1="14" y1="30" x2="46" y2="30" stroke="#0B3D91" stroke-width="2"/>
            <line x1="18.34" y1="18.34" x2="41.66" y2="41.66" stroke="#0B3D91" stroke-width="2"/>
            <line x1="41.66" y1="18.34" x2="18.34" y2="41.66" stroke="#0B3D91" stroke-width="2"/>
        </svg>
        <p>Loading...</p>
    </div>
</div>

<footer>© Ministry of Labour & Employment, Government of India</footer>

<script>
    // Generate or retrieve a unique device ID
    function getDeviceId() {
        let deviceId = localStorage.getItem('device_id');
        if (!deviceId) {
            // Use crypto API if available, else fallback random string
            if (window.crypto && window.crypto.randomUUID) {
                deviceId = crypto.randomUUID();
            } else {
                deviceId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
            localStorage.setItem('device_id', deviceId);
        }
        return deviceId;
    }

    document.getElementById('proceedBtn').addEventListener('click', function() {
        // Show Chakra spinner
        document.getElementById('chakra-overlay').classList.add('active');

        const deviceId = getDeviceId();
        const contractorId = 'contr-' + deviceId;

        // Send to server via fetch
        fetch('/contractor/proceed', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contractor_id: contractorId })
        })
        .then(response => response.json())
        .then(data => {
            if (data.redirect) {
                window.location.href = data.redirect;
            } else {
                alert('Error: ' + (data.error || 'Unknown error'));
                document.getElementById('chakra-overlay').classList.remove('active');
            }
        })
        .catch(err => {
            alert('Network error. Please try again.');
            document.getElementById('chakra-overlay').classList.remove('active');
        });
    });

    // Also add Chakra on back-to-home (existing)
    document.querySelector('.back-btn').addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.getAttribute('href');
        document.getElementById('chakra-overlay').classList.add('active');
        setTimeout(() => { window.location.href = href; }, 700);
    });
</script>
</body>
</html>
